<!DOCTYPE html><html>
<head>
  <title>The Farm Investment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {margin:0;font-family:Arial;background:#0f172a;color:white;}
    .container {padding:20px;max-width:500px;margin:auto;}
    .card {background:#1e293b;padding:20px;margin:15px 0;border-radius:15px;animation:fadeIn 0.4s ease;}
    button {width:100%;padding:12px;border:none;border-radius:10px;background:#22c55e;color:white;font-weight:bold;margin-top:10px;transition:0.3s;}
    button:hover{transform:scale(1.05);}
    .secondary {background:#3b82f6;}
    .hidden {display:none;}
    .plan {border:1px solid #334155;border-radius:12px;padding:15px;margin:10px 0;transition:0.3s;}
    .plan:hover{transform:translateY(-5px);}@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);} 
  to{opacity:1; transform:translateY(0);} 
}

  </style>
</head>
<body><div class="container"><div id="home">
  <h1>🌱 The Farm Investment</h1>
  <button onclick="showPlans()">Get Started</button>
</div><div id="plans" class="hidden">
  <h2>Select Plan</h2>  <div class="plan">
    <p>Hen: 30 → 100 (10 days)</p>
    <button onclick="selectPlan(30,100)">Select</button>
  </div>  <div class="plan">
    <p>Cow: 50 → 150 (10 days)</p>
    <button onclick="selectPlan(50,150)">Select</button>
  </div>  <div class="plan">
    <p>Rabbit: 100 → 250 (10 days)</p>
    <button onclick="selectPlan(100,250)">Select</button>
  </div><button class="secondary" onclick="goHome()">⬅ Back</button>

</div><div id="payment" class="hidden card">
  <button class="secondary" onclick="goPlans()">⬅ Back</button>
  <h3>Send Payment</h3>
  <p><b>0246278096</b></p>
  <p>MARY ENNINFUL</p>
  <p>MTN</p>
  <button onclick="confirmPayment()">I Have Paid</button>
</div><div id="status" class="hidden card">
  <button class="secondary" onclick="goPlans()">⬅ Back</button>
  <h3 id="statusText"></h3>
</div><div id="dashboard" class="hidden">
  <h2>Dashboard</h2>
  <div class="card">
    <p id="balance"></p>
    <button onclick="showWithdraw()">Withdraw</button>
  </div>
  <button class="secondary" onclick="goPlans()">⬅ Back</button>
</div><div id="withdraw" class="hidden card">
  <button class="secondary" onclick="goDashboard()">⬅ Back</button>
  <h3>Withdraw</h3>
  <input id="amount" placeholder="Enter amount" />
  <button onclick="withdraw()">Submit</button>
</div><div id="admin" class="card">
  <h3>Admin</h3>
  <input id="adminPass" placeholder="Password" />
  <button onclick="loginAdmin()">Login</button>  <div id="adminPanel" class="hidden">
    <button onclick="approve()">Approve Payment</button>
  </div>
</div></div><script>
let selectedAmount=0, returnAmount=0;

function hideAll(){
  document.querySelectorAll('.container > div').forEach(el=>el.classList.add('hidden'));
}

function showPlans(){ hideAll(); document.getElementById('plans').classList.remove('hidden'); }
function goHome(){ hideAll(); document.getElementById('home').classList.remove('hidden'); }
function goPlans(){ hideAll(); document.getElementById('plans').classList.remove('hidden'); }
function goDashboard(){ hideAll(); document.getElementById('dashboard').classList.remove('hidden'); }

function selectPlan(a,b){ selectedAmount=a; returnAmount=b; hideAll(); document.getElementById('payment').classList.remove('hidden'); }

function confirmPayment(){ hideAll(); document.getElementById('status').classList.remove('hidden'); document.getElementById('statusText').innerText='⏳ Payment Pending (24hrs)'; }

function approve(){ hideAll(); document.getElementById('dashboard').classList.remove('hidden'); document.getElementById('balance').innerText='Expected Return: GH₵ '+returnAmount; }

function showWithdraw(){ hideAll(); document.getElementById('withdraw').classList.remove('hidden'); }

function withdraw(){ let amt=document.getElementById('amount').value; if(amt){ alert('Withdrawal Pending ⏳'); goDashboard(); }}

function loginAdmin(){ let pass=document.getElementById('adminPass').value; if(pass==='admin123'){ document.getElementById('adminPanel').classList.remove('hidden'); } else alert('Wrong password'); }
</script></body>
</html>
