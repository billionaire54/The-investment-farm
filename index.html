<!DOCTYPE html>
<html>
<head>
  <title>The Investment Farm</title>
</head>

<body>

<!-- ================= USER PAGE ================= -->
<div id="userPage">

<h1>Investment Farm</h1>

<h3>Make Payment</h3>

<p><b>Send Money To:</b></p>
<p>Name: MARY ENNINFUL</p>
<p>Number: 0246278096</p>
<p>Network: MTN</p>

<br>

<input id="name" placeholder="Your Name"><br><br>
<input id="amount" placeholder="Amount"><br><br>

<button onclick="submitPayment()">I Have Paid</button>

<br><br>
<button onclick="showAdmin()">Admin Login</button>

</div>


<!-- ================= ADMIN PAGE ================= -->
<div id="adminPage" style="display:none;">

<h2>Admin Login</h2>

<input type="password" id="pass" placeholder="Enter password">
<button onclick="login()">Login</button>

<div id="dashboard" style="display:none;">
  <h3>Payments</h3>
  <div id="list"></div>
</div>

<br>
<button onclick="backToUser()">Back</button>

</div>


<script type="module">

// 🔥 FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCY4EYV5FiTbsnm0s2VsYo6UzHi3eEaVeo",
  authDomain: "the-farm-investment.firebaseapp.com",
  projectId: "the-farm-investment",
  storageBucket: "the-farm-investment.firebasestorage.app",
  messagingSenderId: "438325688548",
  appId: "1:438325688548:web:ea5550aa2b135e7f5b14f1",
  measurementId: "G-EMS1Z41VS8"
};

// 🔥 INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= USER FUNCTION =================
async function submitPayment() {

  const name = document.getElementById("name").value;
  const amount = document.getElementById("amount").value;

  if (!name || !amount) {
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "payments"), {
    name: name,
    amount: amount,
    phone: "0246278096",
    network: "MTN",
    status: "Pending",
    date: new Date().toLocaleString()
  });

  alert("Payment submitted. Wait for approval.");

  document.getElementById("name").value = "";
  document.getElementById("amount").value = "";
}


// ================= ADMIN NAVIGATION =================
function showAdmin() {
  document.getElementById("userPage").style.display = "none";
  document.getElementById("adminPage").style.display = "block";
}

function backToUser() {
  document.getElementById("adminPage").style.display = "none";
  document.getElementById("userPage").style.display = "block";
}


// ================= ADMIN LOGIN =================
function login() {
  const pass = document.getElementById("pass").value;

  if (pass === "12345") {
    document.getElementById("dashboard").style.display = "block";
    loadPayments();
  } else {
    alert("Wrong password");
  }
}


// ================= LOAD PAYMENTS =================
async function loadPayments() {
  const querySnapshot = await getDocs(collection(db, "payments"));

  let html = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    html += `
      <div style="border:1px solid black; margin:10px; padding:10px;">
        <p><b>Name:</b> ${data.name}</p>
        <p><b>Amount:</b> ${data.amount}</p>
        <p><b>Status:</b> ${data.status}</p>
        <button onclick="approve('${docSnap.id}')">Approve</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}


// ================= APPROVE =================
async function approve(id) {
  const ref = doc(db, "payments", id);
  await updateDoc(ref, { status: "Approved" });

  alert("Payment Approved");
  loadPayments();
}


// 🔥 MAKE GLOBAL
window.submitPayment = submitPayment;
window.showAdmin = showAdmin;
window.backToUser = backToUser;
window.login = login;
window.approve = approve;

</script>

</body>
</html>
