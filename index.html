<!DOCTYPE html><html>
<head>
  <title>Investment Farm</title>
  <style>
    body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
    .card {background:#1e293b; padding:20px; margin:20px; border-radius:10px;}
    button {padding:10px 20px; margin:10px; border:none; border-radius:5px; cursor:pointer;}
    .hidden {display:none;}
  </style>
</head>
<body><h1>🌱 Investment Farm</h1>
<button onclick="showPlans()">Get Started</button><div id="plans" class="hidden">
  <div class="card">
    <h3>Plan 1</h3>
    <p>30 → 100</p>
    <button onclick="selectPlan(30,100)">Select</button>
  </div>
  <div class="card">
    <h3>Plan 2</h3>
    <p>50 → 150</p>
    <button onclick="selectPlan(50,150)">Select</button>
  </div>
  <div class="card">
    <h3>Plan 3</h3>
    <p>100 → 250</p>
    <button onclick="selectPlan(100,250)">Select</button>
  </div>
</div><div id="payment" class="hidden">
  <h2>Make Payment</h2>
  <p>Send money to:</p>
  <p><b>0246278096</b></p>
  <p>Name: MARY ENNINFUL</p>
  <p>Network: MTN</p>
  <button onclick="confirmPayment()">I Have Paid</button>
</div><div id="status" class="hidden">
  <h2 id="statusText"></h2>
</div><div id="dashboard" class="hidden">
  <h2>User Dashboard</h2>
  <p id="balance"></p>
  <button onclick="withdraw()">Withdraw</button>
</div><div id="admin" class="hidden">
  <h2>Admin Panel</h2>
  <input id="adminPass" placeholder="Enter password" />
  <button onclick="loginAdmin()">Login</button>
  <div id="adminPanel" class="hidden">
    <h3>Approve Payment</h3>
    <button onclick="approve()">Approve User</button>
  </div>
</div><script>
let selectedAmount = 0;
let returnAmount = 0;

function showPlans(){
  document.getElementById('plans').classList.remove('hidden');
}

function selectPlan(amount, ret){
  selectedAmount = amount;
  returnAmount = ret;
  document.getElementById('payment').classList.remove('hidden');
}

function confirmPayment(){
  document.getElementById('status').classList.remove('hidden');
  document.getElementById('statusText').innerText = 'Payment Pending (24hrs)';
}

function approve(){
  document.getElementById('statusText').innerText = 'Payment Approved';
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('balance').innerText = 'Expected Return: ' + returnAmount;
}

function withdraw(){
  let amount = prompt('Enter amount');
  alert('Withdrawal Pending');
}

function loginAdmin(){
  let pass = document.getElementById('adminPass').value;
  if(pass === 'admin123'){
    document.getElementById('adminPanel').classList.remove('hidden');
  } else {
    alert('Wrong password');
  }
}
</script></body>
</html>
